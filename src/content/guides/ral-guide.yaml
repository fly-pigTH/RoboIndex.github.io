title: "RA-L 投稿攻略"
author: "Ce Hao (郝策)"
author_url: "https://github.com/CeHao1"
updated: "2026-02-18"
description: "帮助需要投稿 RA-L 的作者更顺利地完成投稿和发表流程。内容由个人经验总结，不代表官方观点。"

phases:
  - id: phase-1
    title: "投稿前准备"
    subtitle: "了解期刊、准备论文、完成提交"
    chapters:
      - id: positioning
        title: "期刊定位与选刊"
        blocks:
          - type: text
            content: "IEEE Robotics and Automation Letters (RA-L) 根据官网描述："
          - type: quote
            content: "The scope of this journal is to publish peer-reviewed articles that provide a timely and concise account of innovative research ideas and application results, reporting significant theoretical findings and application case studies in areas of robotics and automation."
          - type: text
            content: "简单来说："
          - type: list
            items:
              - "**短期刊** (Letter)，不是 full-length journal"
              - "Topic 覆盖**机器人和自动化**"
              - "支持**理论、算法系统和应用类**贡献"
              - "正文 + reference 共 **8 页**双栏，7 页正文 + 1 页 reference，没有 appendix"
              - "**全年可投**，发表周期约 5 个月"
          - type: heading
            content: "期刊 Taste — 什么样的论文适合投 RAL？"
          - type: text
            content: "RAS 系列更关注**真正的机器人问题**。建议故事从机器人问题出发，而不是从 AI 方法出发："
          - type: compare
            good: "某机器人任务很难，现有 SOTA 方法成功率很低 → 从**机器人任务**出发"
            bad: "某 AI 方法效果不错，但在机器人任务上不够好 → 从 **AI 方法**出发"
            note: "两种写法可能说的是同一件事，但 A 的机器人视角更符合 RAL 的 taste。"
          - type: text
            content: "RAL 适合**故事清晰、贡献精准**的论文。系统不够大的投 RAL，完整的大系统可以投 RSS。"
          - type: heading
            content: "影响力参考"
          - type: text
            content: "笔者个人估算的机器人方向影响力排序："
          - type: list
            items:
              - "**RSS = 1.2× RAL/CoRL = 1.7× ICRA = 2.5× IROS**"
              - "RAL 处于 ICRA/IROS（会议）和 TRO（长期刊）之间的缓冲"
          - type: heading
            content: "RAL vs ICRA 怎么选？"
          - type: list
            items:
              - "论文**完整度高** → 投 RAL。有 rebuttal 机会，质量越高反而越容易中"
              - '论文**不太完整** → 投 ICRA。没有 rebuttal，有一定概率性，完整论文反而可能"运气不好"没中'

      - id: formatting
        title: "写作与格式要求"
        blocks:
          - type: heading
            content: "初稿基本要求"
          - type: list
            items:
              - "使用 **ieee conf 模板**（不是 trans 模板，那是 final version 用的）"
              - "**匿名提交**（双盲），论文里不要写作者信息"
              - "正文 + reference 最多 **8 页**，超过 6 页每页加 $175"
              - "**没有 appendix**，上传额外文字材料可能被 desk reject"
              - "可以提交**多媒体材料**（视频、代码），但不要加 appendix"
          - type: callout
            variant: warning
            content: "**不要在论文里加网页或视频链接！** 运气好编辑让你删，运气不好直接 desk reject。"
          - type: heading
            content: "格式细节"
          - type: list
            items:
              - "不要超出边框或超页，否则无法提交"
              - "空间不够时：用 `\\vspace` 减间距，公式可以用 `\\small` 或 `\\tiny`"
              - "**绝对不要调整页面 margin**"
              - "PDF 和视频都有尺寸限制。PDF 用 Acrobat 压缩，建议用 PDF 格式图片（更清晰更小）"

      - id: links
        title: "重要网站"
        blocks:
          - type: links
            items:
              - label: "RA-L 官网"
                url: "https://www.ieee-ras.org/publications/ra-l/"
              - label: "RAS 投稿系统 (PaperCept)"
                url: "https://ras.papercept.net/conferences/scripts/login.pl"
              - label: "初稿模板 (ieee conf)"
                url: "http://ras.papercept.net/conferences/support/files/ieeeconf.zip"
              - label: "Final version 模板 (ieee trans)"
                url: "https://template-selector.ieee.org/secure/templateSelector/downloadTemplate?publicationTypeId=1&titleId=33&articleId=3&fileId=43"
              - label: "RAS 会员注册 (参会优惠)"
                url: "https://www.ieee.org/membership-catalog/productdetail/showProductDetailPage.html?product=PER481-ELE"

      - id: submission
        title: "初稿提交 Checklist"
        blocks:
          - type: text
            content: "所有操作在 **RAS PaperCept 系统**完成（不是 IEEE 系统）。"
          - type: callout
            variant: warning
            content: |
              **关于通讯作者：**
              · 提交论文的账号 = 系统标记的通讯作者（带 * 号）
              · 系统里的通讯**不是**最终论文通讯，以 camera-ready 为准
              · **不要用老板账号提交！** 否则后续操作都得用他的账号
          - type: heading
            content: "提交 Tips"
          - type: list
            items:
              - "**Editor-in-Chief 不要瞎选**，查查他们的谷歌学术，了解领域"
              - "**Keywords** 不好选可以用 GPT 辅助，然后自己 check"
              - "**要写 cover letter**，涉及到 AE 分配审稿人"
              - "会议转 RAL **不建议**，篇幅不长，2~3 篇会议转一个 full-length journal 更好"

  - id: phase-2
    title: "审稿与修改"
    subtitle: "等待结果、应对审稿意见、完成修改"
    chapters:
      - id: timeline
        title: "投稿周期"
        blocks:
          - type: steps
            items:
              - "提交后，审稿大约 **2.5~3 个月**（desk reject 可能更快）"
              - "收到 Revise and Resubmit 后，有 **30 天**修改时间"
              - "提交 revision 后，AE 一般 **1~2 周**内回复"
          - type: text
            content: "也可能遇到 AE 连续多轮 rebuttal，每次 1 个月修改时间。"

      - id: rebuttal
        title: "Rebuttal 策略"
        blocks:
          - type: text
            content: "审稿约 3 个月后收到邮件。如果是 **Revise and Resubmit** — 恭喜，AE 认可你的工作。接下来有 30 天修改，临近截止 5 天前有邮件提醒。"
          - type: heading
            content: "需要提交的材料"
          - type: list
            ordered: true
            items:
              - "**Response to Reviewers** (Statement of Changes) — 逐条回复"
              - "**标记修改的 manuscript** — 高亮所有改动"
              - "**干净的 manuscript** — 最终版本"
              - "**Cover letter** — 仍然需要"
          - type: heading
            content: "回复技巧"
          - type: list
            items:
              - "对每个 reviewer 的每个 comment 都 **one-by-one 回复**"
              - "官网说可以**更新 title 和 author list**"

  - id: phase-3
    title: "录用后"
    subtitle: "Camera-ready、缴费、发表、会议 Transfer"
    chapters:
      - id: final-version
        title: "Final Version 提交"
        blocks:
          - type: callout
            variant: warning
            content: "Accept 后必须在 **14 天内**完成 camera-ready 版本。这是 hard deadline，超时论文将不会被发表！"
          - type: heading
            content: "参考链接"
          - type: links
            items:
              - label: "投稿流程 — Submission of Final materials"
                url: "https://www.ieee-ras.org/publications/ra-l/submission-procedures/"
              - label: "Final checklist — 修改指南"
                url: "https://www.ieee-ras.org/publications/ra-l/final-submission-checklist/"
              - label: "换模板说明 — Manuscript preparation"
                url: "https://www.ieee-ras.org/publications/ra-l/ra-l-information-for-authors/"
          - type: heading
            content: "Camera-ready Checklist"
          - type: list
            ordered: true
            items:
              - "**换成 ieee trans 模板**。建议复制一份新的 LaTeX 工程，不要在原文件上改"
              - "从 Overleaf 下载所有文件，除了 cls 之外都上传到新模板工程"
              - "**添加作者信息**和左下角作者简介，致谢 (Acknowledgement) 放在 reference 之前"
              - "Trans 空间比 conf 大，一般放得下。超页就调 vspace 或缩图，编辑后续会帮调整"
              - "日期信息大致写即可，编辑会帮你校对"
          - type: text
            content: "之后签署 copyright file（需 DOI），上传 PDF 和工程文件。"
          - type: callout
            variant: warning
            content: |
              **编辑沟通注意：**
              · 编辑会校对并让你确认题目、摘要、作者信息
              · 排版后你需要**确认内容无误**
              · **把引用中的 arxiv 换成正式出版信息！** 从 dblp.org 搜索，搜不到可以告知编辑

      - id: fees
        title: "费用缴纳"
        blocks:
          - type: list
            items:
              - "RAL 会给一个缴费系统"
              - "**Open access** 可选，笔者认为不必，挂 arxiv 就行"
              - "超过 6 页每页 **$175**，用 Visa 或 MasterCard 支付"

      - id: publication
        title: "正式发表"
        blocks:
          - type: text
            content: "缴费后，IEEE 会给一个临时的 **early access** 版本。然后在最近的一期 issue 正式刊登，一般就是**下个月**。"

      - id: transfer
        title: "会议 Transfer"
        blocks:
          - type: callout
            variant: tip
            content: "Accept 后**立刻**就可以在 RAS 系统操作 transfer！不需要等缴费或见刊。"
          - type: list
            items:
              - "可 transfer 的会议和截止时间看官网 **Upcoming conferences**"
              - "Transfer 的会议**不用审稿**，直接 accept"
              - "但仍需交**注册费**，学生账号只能注册一篇"
              - "RAL 承诺提交后 **6 个月内**见刊"
