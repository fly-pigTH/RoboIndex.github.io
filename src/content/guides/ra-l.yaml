title: "RA-L 投稿攻略"
title_en: "RA-L Submission Guide"
venue: "RA-L"
author: "Ce Hao"
updated: "2026-02-18"
summary: "RA-L 是机器人与自动化短期刊，强调真实机器人问题、紧凑贡献与可复现实验。以下基于实战经验拆解全流程。"
summary_en: "RA-L is a concise robotics and automation journal emphasizing practical robot problems. This guide breaks down the full submission workflow based on real experience."
phases:
  - emoji: "🎯"
    stage: "阶段 1：选题与定位"
    stage_en: "Phase 1: Scope and Positioning"
    window: "投稿前 2-6 周"
    window_en: "2-6 weeks before submission"
    focus: "从真实机器人问题切入，突出可落地贡献，不只讲 AI 指标。"
    focus_en: "Start from a real robot problem and define contribution boundaries clearly."
    deliverables: "题目、摘要、关键词、目标 EIC/AE 方向初步确定。"
    deliverables_en: "Final title direction, abstract narrative, keywords, and AE fit."
    alert: "避免叙事脱离机器人场景。"
    alert_en: "Avoid AI-only storytelling detached from robotics context."
    progress: 16
  - emoji: "📝"
    stage: "阶段 2：初稿提交"
    stage_en: "Phase 2: Initial Submission"
    window: "Day 0"
    window_en: "Day 0"
    focus: "使用 IEEE conf 模板匿名投稿，控制篇幅与格式合规。"
    focus_en: "Use IEEE conf template, anonymize thoroughly, and keep format compliant."
    deliverables: "匿名稿件、封面信、关键词、可选视频/代码材料。"
    deliverables_en: "Anonymous manuscript, cover letter, keywords, optional video/code."
    alert: "正文不要放暴露身份的网页链接。"
    alert_en: "Do not expose identity via links in the main paper."
    progress: 32
  - emoji: "📬"
    stage: "阶段 3：审稿等待"
    stage_en: "Phase 3: Review Window"
    window: "约 2.5-3 个月"
    window_en: "Around 2.5-3 months"
    focus: "跟踪状态、准备补充实验，提前规划 R&R 资源。"
    focus_en: "Track status and prepare potential extra experiments in advance."
    deliverables: "潜在补实验脚本、图表更新预案。"
    deliverables_en: "Contingency plan for new figures, ablations, and rewritten sections."
    alert: "不要等到 R&R 才开始补实验。"
    alert_en: "Do not wait until R&R to start additional experiments."
    progress: 50
  - emoji: "🛠️"
    stage: "阶段 4：R&R Rebuttal"
    stage_en: "Phase 4: R&R Rebuttal"
    window: "通常 30 天"
    window_en: "Usually 30 days"
    focus: "对每个 reviewer comment one-by-one 回应并给证据。"
    focus_en: "Respond one-by-one to every reviewer concern with concrete evidence."
    deliverables: "response/statement、标注稿、干净稿、cover letter。"
    deliverables_en: "Response statement, marked manuscript, clean manuscript, cover letter."
    alert: "避免情绪化回复或跳答问题。"
    alert_en: "Avoid emotional replies or unanswered comments."
    progress: 68
  - emoji: "✅"
    stage: "阶段 5：Accept 与 Final"
    stage_en: "Phase 5: Accept and Final"
    window: "Accept 后 14 天内"
    window_en: "Within 14 days after accept"
    focus: "切换 IEEE trans 模板并补齐作者信息、版权流程。"
    focus_en: "Switch to IEEE trans template and complete all publication metadata."
    deliverables: "camera-ready PDF + source、copyright、元信息校对。"
    deliverables_en: "Camera-ready PDF/source, copyright, metadata verification."
    alert: "参考文献尽量替换为正式出版条目。"
    alert_en: "Replace placeholder citations with published references where possible."
    progress: 84
  - emoji: "📢"
    stage: "阶段 6：见刊与 Transfer"
    stage_en: "Phase 6: Publication and Transfer"
    window: "Early Access -> 正式 issue"
    window_en: "Early access to issue publication"
    focus: "缴费后上线 early access，可结合会议窗口执行 transfer。"
    focus_en: "Pay fees, confirm early access, and align transfer with conference windows."
    deliverables: "发表版本、会议 transfer 操作与注册规划。"
    deliverables_en: "Published version and transfer/registration execution plan."
    alert: "transfer 时间窗错过就无法当年挂会。"
    alert_en: "Missing the transfer window can block the target conference cycle."
    progress: 100
checklist:
  - emoji: "📌"
    text: "初稿使用 IEEE conference 模板，正文 + 参考文献通常不超过 8 页。"
    text_en: "Use IEEE conference template for initial submission; keep content within RA-L limits."
  - emoji: "🕵️"
    text: "匿名信息彻底检查：作者、致谢、项目主页、补充材料元数据都要排查。"
    text_en: "Audit anonymity in authorship cues, acknowledgments, links, and metadata."
  - emoji: "🧾"
    text: "准备 cover letter，明确贡献、应用场景与审稿匹配方向。"
    text_en: "Prepare a focused cover letter with contribution, scope fit, and impact context."
  - emoji: "🔑"
    text: "关键词选择要精准，决定后续 AE 与 reviewer 的匹配质量。"
    text_en: "Choose accurate keywords because they heavily affect reviewer matching."
  - emoji: "🧪"
    text: "实验强调真实机器人问题和可复现证据，图表表达尽量直接。"
    text_en: "Prioritize practical robot evidence and reproducible experiment reporting."
  - emoji: "📁"
    text: "R&R 阶段一次性准备 response、标注稿、干净稿，避免漏传。"
    text_en: "For R&R, submit response statement, marked manuscript, and clean manuscript together."
  - emoji: "📚"
    text: "Final 版本前校对参考文献，优先引用正式出版信息而非 arXiv 占位。"
    text_en: "Before final submission, update references from arXiv placeholders to published entries."
  - emoji: "📅"
    text: "accept 后立即倒排 final + transfer 时间，别等邮件提醒。"
    text_en: "Back-schedule final and transfer immediately after accept notification."
pitfalls:
  - emoji: "🚫"
    text: "正文直接放网页/视频链接导致匿名违规，存在 desk reject 风险。"
    text_en: "Identity-revealing links in the manuscript can trigger desk rejection."
  - emoji: "📏"
    text: "页面超限或格式越界（边框、字号、版芯）会导致提交失败。"
    text_en: "Format violations (overflow, margins, layout hacks) can block submission."
  - emoji: "📎"
    text: "把 appendix 当主材料提交，不符合 RA-L 短文定位。"
    text_en: "Treating appendix as required core material conflicts with RA-L short-paper style."
  - emoji: "😵"
    text: "Rebuttal 不逐条回应 reviewer，AE 很难判断修改充分性。"
    text_en: "Skipping one-by-one rebuttal makes revision quality hard for AE to validate."
  - emoji: "⏰"
    text: "R&R 30 天和 Final 14 天准备不足，最后只能仓促提交。"
    text_en: "Underestimating 30-day R&R or 14-day final windows leads to rushed quality loss."
  - emoji: "🧩"
    text: "模板切换后作者信息/致谢/thanks 区域遗漏，引发返修。"
    text_en: "Template switch errors in author block/thanks/ack sections cause avoidable rework."
  - emoji: "💸"
    text: "超页费用与 OA 选项没有提前沟通，财务流程被动。"
    text_en: "Late fee/OA decisions may disrupt financial and approval workflows."
  - emoji: "🎯"
    text: "transfer 时间窗没盯住，accept 了也可能错过目标会议。"
    text_en: "Ignoring transfer windows may miss conference presentation opportunities."
